{% extends 'base.html' %}
{% block title %}Должности{% endblock %}
{% block content %}

<div class="page-head">
    <div>
        <h1>Должности</h1>
        <div class="sub">Справочник должностей сотрудников · Всего: {{ positions|length }}</div>
    </div>
    <div class="page-actions">
        <a href="{% url 'position-add' %}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg"></i>Добавить
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body flush">
        <table class="tbl">
            <thead>
                <tr>
                    <th style="width:40px">#</th>
                    <th>Название</th>
                </tr>
            </thead>
            <tbody>
                {% for p in positions %}
                <tr class="row-link" onclick="window.location='{% url 'position-edit' p.pk %}'">
                    <td class="muted">{{ forloop.counter }}</td>
                    <td class="fwm">{{ p.name }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2"><div class="empty"><i class="bi bi-diagram-3"></i>Нет должностей</div></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}

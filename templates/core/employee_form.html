{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>{{ title }}</h2>
    <a href="{% url 'employee-list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Назад
    </a>
</div>
<div class="card" style="max-width: 700px;">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                {% for field in form %}
                <div class="col-md-6 mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            {% if object %}
            <a href="{% url 'employee-detail' object.pk %}" class="btn btn-outline-secondary ms-2">Отмена</a>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}

<div class="page-head">
    <div>
        <div class="crumbs">
            <a href="{% url 'parent-list' %}">Опекуны</a>
            <span class="sep">/</span>
            <span>{{ title }}</span>
        </div>
        <h1>{{ title }}</h1>
    </div>
    <div class="page-actions">
        <a href="{% url 'parent-list' %}" class="btn btn-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>Назад
        </a>
    </div>
</div>

<div class="card" style="max-width:700px;">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px;">
                {% for field in form %}
                <div class="mb-3">
                    <label class="field-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="invalid-feedback" style="display:block;">{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top:8px;">
                <i class="bi bi-check-lg"></i>Сохранить
            </button>
        </form>
    </div>
</div>

{% endblock %}

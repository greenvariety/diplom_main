<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка завершена</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        .card {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28), 0 2px 8px rgba(0, 0, 0, 0.12);
            width: 480px;
            padding: 40px 36px 36px;
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .icon-wrap {
            width: 54px;
            height: 54px;
            background: #16a34a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .icon-wrap svg {
            width: 28px;
            height: 28px;
            fill: #ffffff;
        }

        .card-title {
            font-size: 1.075rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.3px;
            text-align: center;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 5px;
            text-align: center;
        }

        .warning-box {
            background: #fffbeb;
            border: 1.5px solid #fbbf24;
            border-radius: 10px;
            padding: 16px 18px;
            margin-bottom: 20px;
        }

        .warning-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #92400e;
            margin-bottom: 8px;
        }

        .warning-text {
            font-size: 0.8125rem;
            color: #78350f;
            line-height: 1.55;
        }

        .seed-box {
            background: #f1f5f9;
            border: 1.5px solid #cbd5e1;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .seed-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #64748b;
            margin-bottom: 10px;
        }

        .seed-words {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 0.02em;
            word-spacing: 4px;
            line-height: 1.6;
            font-family: 'Courier New', Courier, monospace;
        }

        .copy-btn {
            display: block;
            width: 100%;
            padding: 9px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #1e293b;
            background: #f1f5f9;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.15s;
        }

        .copy-btn:hover { background: #e2e8f0; }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 11px;
            font-size: 0.9375rem;
            font-weight: 600;
            color: #ffffff;
            background: #16a34a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            letter-spacing: 0.01em;
            text-decoration: none;
            text-align: center;
        }

        .btn-submit:hover { background: #15803d; color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="icon-wrap">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                </svg>
            </div>
            <h1 class="card-title">Аккаунт создан</h1>
            <p class="card-subtitle">Сохраните сид-фразу до продолжения</p>
        </div>

        <div class="warning-box">
            <div class="warning-title">Важно: сохраните сид-фразу</div>
            <div class="warning-text">
                Это единственный способ восстановить пароль. После закрытия страницы
                сид-фраза больше не будет показана. Запишите её или сохраните в надёжном месте.
            </div>
        </div>

        <div class="seed-box">
            <div class="seed-label">Ваша сид-фраза (12 слов)</div>
            <div class="seed-words" id="seed-text">{{ seed }}</div>
        </div>

        <button class="copy-btn" onclick="copySeed()">Скопировать сид-фразу</button>

        <a href="{% url 'institution-list' %}" class="btn-submit">Готово — перейти к заведениям</a>
    </div>

    <script>
        function copySeed() {
            const text = document.getElementById('seed-text').textContent.trim();
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const orig = btn.textContent;
                btn.textContent = 'Скопировано!';
                setTimeout(() => btn.textContent = orig, 2000);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АИС «Учёт студентов» — Дизайн</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-theme="light" data-density="medium">

<!-- Outer screen browser -->
<nav id="screen-browser">
  <div class="sb-brand"><span class="dot"></span>АИС · карта экранов</div>
  <h6>Аутентификация</h6>
  <button data-screen="login" class="active">Вход в систему</button>
  <button data-screen="register">Регистрация владельца</button>
  <button data-screen="seed-phrase">Сид-фраза (1 раз)</button>
  <button data-screen="recover">Восстановление пароля</button>
  <h6>Организации (владелец)</h6>
  <button data-screen="org-list">Мои организации</button>
  <h6>Дашборд</h6>
  <button data-screen="dash-owner">Дашборд · владелец</button>
  <button data-screen="dash-admin">Дашборд · админ</button>
  <button data-screen="dash-teacher">Дашборд · преподаватель</button>
  <h6>Студенты</h6>
  <button data-screen="students">Список студентов</button>
  <button data-screen="student-detail">Карточка студента</button>
  <h6>Сотрудники</h6>
  <button data-screen="employees">Список сотрудников</button>
  <button data-screen="employee-detail">Карточка сотрудника</button>
  <h6>Структура</h6>
  <button data-screen="groups">Группы</button>
  <button data-screen="group-detail">Карточка группы</button>
  <button data-screen="faculties">Факультеты</button>
  <button data-screen="subjects">Предметы</button>
  <button data-screen="parents">Опекуны</button>
  <h6>Администрирование</h6>
  <button data-screen="users">Пользователи</button>
  <button data-screen="positions">Должности</button>
  <button data-screen="delreq">Заявки на удаление</button>
  <button data-screen="audit">Журнал изменений</button>
  <h6>Всплывающие окна</h6>
  <button data-modal="studentForm">+ Студент / редакт.</button>
  <button data-modal="employeeForm">+ Сотрудник</button>
  <button data-modal="groupForm">+ Группа</button>
  <button data-modal="facultyForm">+ Факультет</button>
  <button data-modal="parentForm">+ Опекун</button>
  <button data-modal="subjectForm">+ Предмет</button>
  <button data-modal="positionForm">+ Должность</button>
  <button data-modal="userForm">+ Пользователь</button>
  <button data-modal="transfer">Перевод студента</button>
  <button data-modal="deleteConfirm">Подтв. удаления</button>
  <button data-modal="approveDelete">Одобрить удаление</button>
  <button data-modal="uploadDoc">Загрузка документа</button>
  <button data-modal="assignSubject">Назначить предмет</button>
  <button data-modal="auditDiff">Diff изменения</button>
  <button data-modal="logout">Выход</button>
  <button data-modal="studentDetail">Карточка студента (модал)</button>
  <button data-modal="groupDetail">Карточка группы (модал)</button>
  <button data-modal="facultyDetail">Карточка факультета (модал)</button>
  <button data-modal="employeeDetail">Карточка сотрудника (модал)</button>
</nav>

<div id="app-host"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="utils.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="modals.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const S = window.AIS_SCREENS;
const M = window.AIS_MODALS;
const A = window.AIS_AUTH;
const { ToastProvider, ScreenTransition } = window.AIS_UTILS;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": {
    "value": "teal",
    "color": "#0f766e"
  },
  "density": "medium",
  "theme": "light"
}/*EDITMODE-END*/;

const ACCENT_PRESETS = {
  teal:    { '--accent': '#0f766e', '--accent-soft': '#ccfbf1', '--accent-ink': '#134e4a', '--accent-hover': '#115e59' },
  indigo:  { '--accent': '#4f46e5', '--accent-soft': '#e0e7ff', '--accent-ink': '#312e81', '--accent-hover': '#4338ca' },
  graphite:{ '--accent': '#1f2937', '--accent-soft': '#e5e7eb', '--accent-ink': '#111827', '--accent-hover': '#111827' },
};

function applyTweaks(t) {
  document.body.dataset.theme = t.theme;
  document.body.dataset.density = t.density;
  const preset = ACCENT_PRESETS[t.accent] || ACCENT_PRESETS.teal;
  Object.entries(preset).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
}

function App() {
  const [tweaks, setTweaksState] = useState(TWEAK_DEFAULTS);
  const setTweak = (k, v) => {
    const next = typeof k === 'object' ? { ...tweaks, ...k } : { ...tweaks, [k]: v };
    setTweaksState(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: typeof k === 'object' ? k : { [k]: v } }, '*');
  };
  useEffect(() => applyTweaks(tweaks), [tweaks]);

  const [screen, setScreen] = useState('login');
  const [modal, setModal] = useState(null);

  const openModal = (kind, data) => setModal({ kind, data });
  const closeModal = () => setModal(null);

  // Outer screen-browser wiring
  useEffect(() => {
    const handler = e => {
      const sBtn = e.target.closest('[data-screen]');
      const mBtn = e.target.closest('[data-modal]');
      if (sBtn) {
        document.querySelectorAll('#screen-browser button').forEach(b => b.classList.remove('active'));
        sBtn.classList.add('active');
        setScreen(sBtn.dataset.screen);
        setModal(null);
      } else if (mBtn) {
        openModal(mBtn.dataset.modal);
      }
    };
    document.getElementById('screen-browser').addEventListener('click', handler);
    return () => document.getElementById('screen-browser').removeEventListener('click', handler);
  }, []);

  // Tweaks toolbar wiring
  useEffect(() => {
    const onMsg = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  let body;
  switch (screen) {
    case 'login':           body = <A.LoginScreen onLogin={u => setScreen(u === 'owner1' ? 'org-list' : 'dash-admin')} onRegister={() => setScreen('register')} onRecover={() => setScreen('recover')} />; break;
    case 'register':        body = <A.RegisterScreen onDone={() => setScreen('seed-phrase')} onBack={() => setScreen('login')} />; break;
    case 'seed-phrase':     body = <A.SeedPhraseScreen onDone={() => setScreen('org-list')} />; break;
    case 'recover':         body = <A.RecoverPasswordScreen onBack={() => setScreen('login')} />; break;
    case 'org-list':        body = <S.OrganizationList openModal={openModal} onSwitch={() => setScreen('dash-owner')} />; break;
    case 'dash-owner':      body = <S.DashboardOwner openModal={openModal} />; break;
    case 'dash-super':      body = <S.DashboardOwner openModal={openModal} />; break;
    case 'dash-admin':      body = <S.DashboardAdmin openModal={openModal} />; break;
    case 'dash-teacher':    body = <S.DashboardTeacher openModal={openModal} />; break;
    case 'students':        body = <S.StudentList openModal={openModal} />; break;
    case 'student-detail':  body = <S.StudentDetail openModal={openModal} />; break;
    case 'employees':       body = <S.EmployeeList openModal={openModal} />; break;
    case 'employee-detail': body = <S.EmployeeDetail openModal={openModal} />; break;
    case 'groups':          body = <S.GroupList openModal={openModal} />; break;
    case 'group-detail':    body = <S.GroupDetail openModal={openModal} />; break;
    case 'faculties':       body = <S.FacultyList openModal={openModal} />; break;
    case 'subjects':        body = <S.SubjectList openModal={openModal} />; break;
    case 'parents':         body = <S.ParentList openModal={openModal} />; break;
    case 'users':           body = <S.UserList openModal={openModal} />; break;
    case 'positions':       body = <S.PositionList openModal={openModal} />; break;
    case 'delreq':          body = <S.DeleteRequests openModal={openModal} />; break;
    case 'audit':           body = <S.AuditLog openModal={openModal} />; break;
    default:                body = <A.LoginScreen onLogin={u => setScreen(u === 'owner1' ? 'org-list' : 'dash-admin')} onRegister={() => setScreen('register')} onRecover={() => setScreen('recover')} />;
  }

  let modalEl = null;
  if (modal) {
    const props = { data: modal.data, onClose: closeModal, openModal };
    const map = {
      studentForm: M.StudentFormModal, employeeForm: M.EmployeeFormModal,
      groupForm: M.GroupFormModal, facultyForm: M.FacultyFormModal,
      parentForm: M.ParentFormModal, subjectForm: M.SubjectFormModal,
      positionForm: M.PositionFormModal, userForm: M.UserFormModal,
      transfer: M.TransferModal, deleteConfirm: M.DeleteConfirmModal,
      approveDelete: M.ApproveDeleteModal, uploadDoc: M.UploadDocModal,
      assignSubject: M.AssignSubjectModal, auditDiff: M.AuditDiffModal,
      logout: M.LogoutModal,
      studentDetail: M.StudentDetailModal, groupDetail: M.GroupDetailModal,
      facultyDetail: M.FacultyDetailModal, employeeDetail: M.EmployeeDetailModal,
    };
    const Comp = map[modal.kind];
    if (Comp) modalEl = <Comp {...props} />;
  }

  return (
    <ToastProvider>
      <ScreenTransition keyId={screen}>
        <div className="screen-page">{body}</div>
      </ScreenTransition>
      {modalEl}
      {tweaksOpen && (
        <window.TweaksPanel title="Tweaks" onClose={() => { setTweaksOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }}>
          <window.TweakSection title="Тема">
            <window.TweakRadio label="Режим" value={tweaks.theme} onChange={v => setTweak('theme', v)} options={[{ value: 'light', label: 'Светлая' }, { value: 'dark', label: 'Тёмная' }]} />
          </window.TweakSection>
          <window.TweakSection title="Акцент">
            <window.TweakColor label="Цвет" value={tweaks.accent} onChange={v => setTweak('accent', v)}
              options={[
                { value: 'teal', color: '#0f766e' },
                { value: 'indigo', color: '#4f46e5' },
                { value: 'graphite', color: '#1f2937' },
              ]} />
          </window.TweakSection>
          <window.TweakSection title="Плотность">
            <window.TweakRadio label="Размер" value={tweaks.density} onChange={v => setTweak('density', v)} options={[
              { value: 'compact', label: 'Компакт' },
              { value: 'medium', label: 'Средне' },
              { value: 'spacious', label: 'Просторно' },
            ]} />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('app-host')).render(<App />);
</script>
</body>
</html>

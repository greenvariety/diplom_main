{% comment %}Feedback/debug widget — dev tool, works on all pages (with or without Bootstrap){% endcomment %}

<style>
    /* Floating button (standalone pages without navbar) */
    #fb-float-btn {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        z-index: 9990;
    }
    #fb-float-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 9px 16px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #000;
        background: #ffc107;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: background 0.15s;
    }
    #fb-float-toggle:hover { background: #ffca2c; }
    #fb-float-toggle.fb-btn-active { background: #dc3545; color: #fff; }
    /* Active state for navbar button (base.html) */
    #fb-toggle.active { background-color: #ffc107 !important; color: #000 !important; border-color: #ffc107 !important; }
    /* Overlay */
    #fb-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        z-index: 9995;
        align-items: center;
        justify-content: center;
    }
    #fb-overlay.fb-open { display: flex; }
    #fb-dialog {
        background: #fff;
        border-radius: 12px;
        width: 480px;
        max-width: 92vw;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #fb-dialog-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid #e2e8f0;
        font-size: 0.9375rem;
        font-weight: 600;
        color: #1e293b;
    }
    #fb-close-btn {
        background: none;
        border: none;
        font-size: 1.1rem;
        cursor: pointer;
        color: #94a3b8;
        padding: 2px 6px;
        line-height: 1;
        border-radius: 4px;
    }
    #fb-close-btn:hover { background: #f1f5f9; color: #475569; }
    #fb-dialog-body { padding: 16px 20px; }
    #fb-sel-preview { font-size: 0.75rem; color: #64748b; margin-bottom: 6px; }
    #fb-el-preview {
        font-size: 0.8rem;
        font-family: monospace;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        padding: 6px 10px;
        margin-bottom: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #475569;
    }
    #fb-comment-input {
        width: 100%;
        min-height: 90px;
        padding: 10px 12px;
        font-size: 0.9rem;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        outline: none;
        resize: vertical;
        font-family: inherit;
        color: #1e293b;
        box-sizing: border-box;
        transition: border-color 0.15s, box-shadow 0.15s;
    }
    #fb-comment-input:focus { border-color: #ffc107; box-shadow: 0 0 0 3px rgba(255,193,7,0.2); }
    #fb-dialog-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 12px 20px;
        border-top: 1px solid #e2e8f0;
    }
    #fb-cancel-btn {
        padding: 8px 16px;
        font-size: 0.875rem;
        font-weight: 500;
        color: #475569;
        background: #f1f5f9;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
    }
    #fb-cancel-btn:hover { background: #e2e8f0; }
    #fb-save-btn {
        padding: 8px 16px;
        font-size: 0.875rem;
        font-weight: 600;
        color: #000;
        background: #ffc107;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
    }
    #fb-save-btn:hover { background: #ffca2c; }
    /* Hover highlight */
    body.fb-mode { cursor: crosshair !important; }
    body.fb-mode *:not(#fb-float-btn):not(#fb-float-btn *):not(#fb-overlay):not(#fb-overlay *):not(.navbar):not(.navbar *) { pointer-events: auto; }
    .fb-hi { outline: 2px dashed #ffc107 !important; outline-offset: 2px !important; background-color: rgba(255,193,7,0.08) !important; }
</style>

<!-- Floating button — shown only when there's no navbar #fb-toggle -->
<div id="fb-float-btn" style="display:none;">
    <button id="fb-float-toggle">✏️ Режим правки</button>
</div>

<!-- Modal dialog (vanilla, no Bootstrap required) -->
<div id="fb-overlay">
    <div id="fb-dialog">
        <div id="fb-dialog-header">
            ✏️ Комментарий к элементу
            <button id="fb-close-btn">✕</button>
        </div>
        <div id="fb-dialog-body">
            <div id="fb-sel-preview"></div>
            <div id="fb-el-preview"></div>
            <textarea id="fb-comment-input" placeholder="Что нужно исправить?"></textarea>
        </div>
        <div id="fb-dialog-footer">
            <button id="fb-cancel-btn">Отмена</button>
            <button id="fb-save-btn">Сохранить</button>
        </div>
    </div>
</div>

<script>
(function () {
    if (window.__fbLoaded) return;
    window.__fbLoaded = true;

    const SAVE_URL = '{% url "feedback-save" %}';
    const CSRF = '{{ csrf_token }}';

    let fbActive = false;
    let hovered = null;
    let pickedSelector = '';

    // Use existing navbar button if present, otherwise show floating one
    const floatWrap = document.getElementById('fb-float-btn');
    const navBtn = document.getElementById('fb-toggle');
    let toggleBtn;
    let usingFloat = false;

    if (navBtn && !floatWrap.contains(navBtn)) {
        toggleBtn = navBtn;
    } else {
        floatWrap.style.display = 'block';
        toggleBtn = document.getElementById('fb-float-toggle');
        usingFloat = true;
    }

    const overlay = document.getElementById('fb-overlay');

    function cssSelector(el) {
        if (!el || el === document.body) return 'body';
        if (el.id) return '#' + el.id;
        const parts = [];
        let cur = el;
        while (cur && cur.nodeType === 1 && cur !== document.body) {
            let sel = cur.nodeName.toLowerCase();
            if (cur.id) { parts.unshift('#' + cur.id); break; }
            let sib = cur, nth = 1;
            while ((sib = sib.previousElementSibling)) {
                if (sib.nodeName === cur.nodeName) nth++;
            }
            if (nth > 1) sel += ':nth-of-type(' + nth + ')';
            if (cur.className && typeof cur.className === 'string') {
                const cls = cur.className.trim().split(/\s+/).filter(c => !c.startsWith('fb-')).slice(0, 2).join('.');
                if (cls) sel += '.' + cls;
            }
            parts.unshift(sel);
            cur = cur.parentElement;
        }
        return parts.join(' > ');
    }

    function isUI(el) {
        return el.closest('#fb-float-btn') || el.closest('#fb-overlay') ||
               el.closest('.navbar') || el === navBtn;
    }

    function openDialog(el) {
        pickedSelector = cssSelector(el);
        const preview = (el.innerText || el.outerHTML).slice(0, 160).trim();
        document.getElementById('fb-sel-preview').textContent = pickedSelector;
        document.getElementById('fb-el-preview').textContent = preview || '(нет текста)';
        document.getElementById('fb-comment-input').value = '';
        overlay.classList.add('fb-open');
        setTimeout(() => document.getElementById('fb-comment-input').focus(), 60);
    }

    function closeDialog() { overlay.classList.remove('fb-open'); }

    function setActive(on) {
        fbActive = on;
        document.body.classList.toggle('fb-mode', on);
        if (usingFloat) {
            const t = document.getElementById('fb-float-toggle');
            t.classList.toggle('fb-btn-active', on);
            t.textContent = on ? '✕ Выйти из режима' : '✏️ Режим правки';
        } else {
            toggleBtn.classList.toggle('active', on);
            toggleBtn.innerHTML = on
                ? '<i class="bi bi-x-circle me-1"></i>Выйти из режима правки'
                : '<i class="bi bi-pencil-square me-1"></i>Режим правки';
        }
        if (!on && hovered) { hovered.classList.remove('fb-hi'); hovered = null; }
    }

    toggleBtn.addEventListener('click', function () { setActive(!fbActive); });

    document.addEventListener('mouseover', function (e) {
        if (!fbActive || isUI(e.target)) return;
        if (hovered) hovered.classList.remove('fb-hi');
        hovered = e.target;
        hovered.classList.add('fb-hi');
    }, true);

    document.addEventListener('mouseout', function (e) {
        if (!fbActive || !hovered || isUI(e.target)) return;
        hovered.classList.remove('fb-hi');
    }, true);

    document.addEventListener('click', function (e) {
        if (!fbActive || isUI(e.target)) return;
        e.preventDefault();
        e.stopPropagation();
        openDialog(e.target);
    }, true);

    document.getElementById('fb-close-btn').addEventListener('click', closeDialog);
    document.getElementById('fb-cancel-btn').addEventListener('click', closeDialog);
    overlay.addEventListener('click', function (e) { if (e.target === overlay) closeDialog(); });

    document.getElementById('fb-save-btn').addEventListener('click', function () {
        const comment = document.getElementById('fb-comment-input').value.trim();
        if (!comment) { document.getElementById('fb-comment-input').focus(); return; }
        fetch(SAVE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
            body: JSON.stringify({
                page_url: window.location.pathname,
                selector: pickedSelector,
                element_preview: document.getElementById('fb-el-preview').textContent,
                comment: comment,
            })
        }).then(r => r.json()).then(d => {
            if (d.ok) {
                closeDialog();
                const t = document.createElement('div');
                t.style.cssText = 'position:fixed;top:20px;right:20px;z-index:10000;background:#198754;color:#fff;padding:10px 18px;border-radius:8px;font-size:0.875rem;font-family:system-ui,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.2);';
                t.textContent = '✓ Комментарий сохранён';
                document.body.appendChild(t);
                setTimeout(() => {
                    t.style.transition = 'opacity 0.4s';
                    t.style.opacity = '0';
                    setTimeout(() => t.remove(), 400);
                }, 2500);
            }
        }).catch(() => {});
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeDialog();
        if (e.key === 'Enter' && e.ctrlKey && overlay.classList.contains('fb-open')) {
            document.getElementById('fb-save-btn').click();
        }
    });
})();
</script>

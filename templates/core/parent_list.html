{% extends 'base.html' %}
{% block title %}Родители{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Родители / Опекуны</h2>
    <a href="{% url 'parent-add' %}" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Добавить
    </a>
</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>#</th><th>ФИО</th><th>Телефон</th><th>Email</th><th>Действия</th></tr>
            </thead>
            <tbody>
                {% for p in parents %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td><a href="{% url 'parent-detail' p.pk %}">{{ p }}</a></td>
                    <td>{{ p.phone|default:"—" }}</td>
                    <td>{{ p.email|default:"—" }}</td>
                    <td>
                        <a href="{% url 'parent-detail' p.pk %}" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a href="{% url 'parent-edit' p.pk %}" class="btn btn-sm btn-outline-secondary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a href="{% url 'parent-delete-request' p.pk %}" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="5" class="text-center text-muted py-4">Нет родителей</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

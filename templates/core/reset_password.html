<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый пароль</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        .card {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28), 0 2px 8px rgba(0, 0, 0, 0.12);
            width: 400px;
            padding: 40px 36px 36px;
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .icon-wrap {
            width: 54px;
            height: 54px;
            background: #2563eb;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .icon-wrap svg { width: 28px; height: 28px; fill: #ffffff; }

        .card-title {
            font-size: 1.075rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.3px;
            text-align: center;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 5px;
            text-align: center;
        }

        .user-badge {
            display: inline-block;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #1d4ed8;
            margin-bottom: 20px;
        }

        .field-group { margin-bottom: 18px; }

        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #475569;
            margin-bottom: 7px;
        }

        .field-input {
            width: 100%;
            padding: 10px 13px;
            font-size: 0.9375rem;
            color: #1e293b;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
        }

        .field-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
            background: #ffffff;
        }

        .field-input.is-error { border-color: #fca5a5; background: #fff5f5; }

        .error-message {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: #ef4444;
            margin-top: 14px;
        }

        .error-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ef4444;
            flex-shrink: 0;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 11px;
            font-size: 0.9375rem;
            font-weight: 600;
            color: #ffffff;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 26px;
            transition: background 0.15s;
        }

        .btn-submit:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="icon-wrap">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                </svg>
            </div>
            <h1 class="card-title">Установить новый пароль</h1>
            <p class="card-subtitle">Аккаунт: <strong>{{ user_obj.username }}</strong></p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="field-group">
                <label class="field-label" for="id_new_password">Новый пароль</label>
                <input class="field-input{% if form.non_field_errors or form.new_password.errors %} is-error{% endif %}"
                    type="password" id="id_new_password" name="new_password" autofocus>
            </div>

            <div class="field-group">
                <label class="field-label" for="id_new_password2">Повторите пароль</label>
                <input class="field-input{% if form.non_field_errors or form.new_password2.errors %} is-error{% endif %}"
                    type="password" id="id_new_password2" name="new_password2">
            </div>

            {% if form.non_field_errors %}
            <div class="error-message">
                <span class="error-dot"></span>
                {% for error in form.non_field_errors %}{{ error }}{% endfor %}
            </div>
            {% endif %}

            <button type="submit" class="btn-submit">Сохранить пароль</button>
        </form>
    </div>
{% include 'includes/feedback_widget.html' %}
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        .card {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28), 0 2px 8px rgba(0, 0, 0, 0.12);
            width: 420px;
            padding: 40px 36px 36px;
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .icon-wrap {
            width: 54px;
            height: 54px;
            background: #d97706;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .icon-wrap svg { width: 28px; height: 28px; fill: #ffffff; }

        .card-title {
            font-size: 1.075rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.3px;
            text-align: center;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 5px;
            text-align: center;
        }

        .field-group { margin-bottom: 18px; }

        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #475569;
            margin-bottom: 7px;
        }

        .field-input {
            width: 100%;
            padding: 10px 13px;
            font-size: 0.9375rem;
            color: #1e293b;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
        }

        .field-input:focus {
            border-color: #d97706;
            box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.12);
            background: #ffffff;
        }

        .field-input.is-error { border-color: #fca5a5; background: #fff5f5; }

        .error-message {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: #ef4444;
            margin-top: 14px;
        }

        .error-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ef4444;
            flex-shrink: 0;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 11px;
            font-size: 0.9375rem;
            font-weight: 600;
            color: #ffffff;
            background: #d97706;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 26px;
            transition: background 0.15s;
        }

        .btn-submit:hover { background: #b45309; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 0.8125rem;
            color: #94a3b8;
            text-decoration: none;
        }

        .back-link b { color: #2563eb; font-weight: 500; }
        .back-link:hover b { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="icon-wrap">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
                </svg>
            </div>
            <h1 class="card-title">Восстановление пароля</h1>
            <p class="card-subtitle">Введите логин и вашу сид-фразу (12 слов)</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="field-group">
                <label class="field-label" for="id_username">Логин</label>
                <input class="field-input{% if form.non_field_errors %} is-error{% endif %}"
                    type="text" id="id_username" name="username"
                    value="{{ form.username.value|default:'' }}" autofocus>
            </div>

            <div class="field-group">
                <label class="field-label" for="id_seed_phrase">Сид-фраза (6 слов через пробел)</label>
                <input class="field-input{% if form.non_field_errors %} is-error{% endif %}"
                    type="text" id="id_seed_phrase" name="seed_phrase"
                    value="{{ form.seed_phrase.value|default:'' }}"
                    placeholder="слово слово слово слово слово слово">
            </div>

            {% if form.non_field_errors %}
            <div class="error-message">
                <span class="error-dot"></span>
                {% for error in form.non_field_errors %}{{ error }}{% endfor %}
            </div>
            {% endif %}

            <button type="submit" class="btn-submit">Продолжить</button>
        </form>

        <a href="{% url 'login' %}" class="back-link">Вспомнили пароль? <b>Войти</b></a>
    </div>
</body>
</html>

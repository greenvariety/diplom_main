{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}

<div class="page-head">
    <div>
        <div class="crumbs">
            <a href="{% url 'parent-list' %}">Опекуны</a>
            <span class="sep">/</span>
            <span>{{ title }}</span>
        </div>
        <h1>{{ title }}</h1>
    </div>
    <div class="page-actions">
        <a href="{% url 'parent-list' %}" class="btn btn-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>Назад
        </a>
    </div>
</div>

<div class="card" style="max-width:720px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="card-body">
            <div class="form-grid">
                {% for field in form %}
                <div class="field">
                    <label class="field-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="field-error">{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endfor %}
            </div>
        </div>
        <div class="card-foot">
            <a href="{% url 'parent-list' %}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i>Отмена
            </a>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i>Сохранить
            </button>
        </div>
    </form>
</div>

{% endblock %}

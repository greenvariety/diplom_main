{% extends 'base.html' %}
{% block title %}Предметы{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Предметы</h2>
    <a href="{% url 'subject-add' %}" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Добавить
    </a>
</div>

<form method="get" class="mb-3">
    <div class="input-group" style="max-width:400px;">
        <input type="text" name="q" value="{{ q }}" class="form-control" placeholder="Поиск по названию...">
        <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
        {% if q %}<a href="{% url 'subject-list' %}" class="btn btn-outline-danger"><i class="bi bi-x"></i></a>{% endif %}
    </div>
</form>

<div class="card">
    <div class="card-header text-end text-muted small py-1">всего {{ total }}</div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>Название предмета</th></tr>
            </thead>
            <tbody>
                {% for s in subjects %}
                <tr onclick="window.location='{% url 'subject-detail' s.pk %}'" style="cursor:pointer;">
                    <td class="fw-semibold">{{ s.name }}</td>
                </tr>
                {% empty %}
                <tr class="no-hover"><td class="text-center text-muted py-4">Нет предметов</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
